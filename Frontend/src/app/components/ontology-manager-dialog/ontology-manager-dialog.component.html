<div class="relative bg-gradient-to-br from-blue-50 to-white rounded-xl shadow-2xl border border-blue-100 w-full overflow-y-auto max-h-[600px] max-w-[1200px]">

  <!-- Close button -->
  <button
    class="absolute top-4 right-4 z-10 bg-white hover:bg-gray-100 rounded-full p-1.5 transition-all duration-200 shadow-sm hover:shadow-md text-gray-500 hover:text-gray-700"
    (click)="close()">
    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>
    </svg>
  </button>

  <div class="p-6 overflow-y-auto">

    <!-- Header with icon -->
    <div class="flex items-center gap-3 mb-6 pb-3 border-b border-blue-200 pr-8">
      <div class="bg-blue-600 p-2 rounded-lg shadow-md">
        <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 7v10c0 2 1.5 4 4 4h8c2.5 0 4-2 4-4V7c0-2-1.5-4-4-4H8c-2.5 0-4 2-4 4z"></path>
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 3v4m8-4v4"></path>
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 11v6m-3-3h6"></path>
        </svg>
      </div>
      <div>
        <h2 class="text-2xl font-bold text-gray-800">Ontology Manager</h2>
        <p class="text-sm text-blue-600">Manage your ontology collection</p>
      </div>
    </div>

    <!-- LISTE -->
    <div class="space-y-3 mb-6">
      <div *ngFor="let ontology of ontologies; let i = index"
           class="group flex flex-col sm:flex-row gap-2 bg-white p-3 rounded-xl shadow-sm hover:shadow-md transition-all duration-200 border border-gray-200 hover:border-blue-300">
        
        <!-- URL -->
        <div class="flex-1 min-w-0">
          <label class="block text-xs font-semibold text-gray-600 mb-1 ml-1">URL</label>
          <input
            class="w-full p-2 rounded-lg border border-gray-300 bg-gray-50 text-gray-600 text-sm font-mono cursor-not-allowed truncate"
            [value]="ontology.url"
            disabled
          />
        </div>

        <!-- LABEL -->
        <div class="flex-1 min-w-0">
          <label class="block text-xs font-semibold text-gray-600 mb-1 ml-1">Label</label>
          <input
            class="w-full p-2 rounded-lg border border-gray-300 focus:border-blue-500 focus:ring-2 focus:ring-blue-200 transition-all text-sm"
            [(ngModel)]="ontology.label"
            name="label-{{ontology.url}}"
            placeholder="Enter label..."
          />
        </div>

        <!-- Actions -->
        <div class="flex gap-2 items-end">
          <!-- SAVE -->
          <button
            class="bg-gradient-to-r from-blue-500 to-blue-600 hover:from-blue-600 hover:to-blue-700 text-white px-3 py-2 rounded-lg transition-all duration-200 shadow-sm hover:shadow-md text-sm font-medium flex items-center gap-1 flex-shrink-0"
            (click)="updateLabel(ontology.url, ontology.label)">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path>
            </svg>
            Save
          </button>

          <!-- DELETE -->
          <button
            class="bg-gradient-to-r from-red-500 to-red-600 hover:from-red-600 hover:to-red-700 text-white p-2 rounded-lg transition-all duration-200 shadow-sm hover:shadow-md flex-shrink-0"
            (click)="delete(ontology.url)">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>
            </svg>
          </button>
        </div>
      </div>

      <!-- Empty state -->
      <div *ngIf="ontologies.length === 0" class="text-center py-8 bg-white rounded-xl border-2 border-dashed border-blue-200">
        <svg class="w-12 h-12 mx-auto text-blue-300 mb-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20 13V6a2 2 0 00-2-2H6a2 2 0 00-2 2v7m16 0v5a2 2 0 01-2 2H6a2 2 0 01-2-2v-5m16 0h-2.586a1 1 0 00-.707.293l-2.414 2.414a1 1 0 01-.707.293h-3.172a1 1 0 01-.707-.293l-2.414-2.414A1 1 0 006.586 13H4"></path>
        </svg>
        <p class="text-gray-500">No ontologies yet</p>
        <p class="text-sm text-blue-500">Add your first ontology below</p>
      </div>
    </div>

    <!-- AJOUT -->
    <form [formGroup]="form" class="border-t-2 border-blue-100 pt-5 mt-2">

      <h3 class="font-semibold text-gray-800 mb-3 flex items-center gap-2">
        <svg class="w-5 h-5 text-blue-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path>
        </svg>
        Add new ontology
      </h3>

      <div class="flex flex-col sm:flex-row gap-3 items-end">
        
        <div class="flex-1">
          <label class="block text-xs font-semibold text-gray-600 mb-1 ml-1">URL *</label>
          <input
            class="w-full p-2 rounded-lg border border-gray-300 focus:border-blue-500 focus:ring-2 focus:ring-blue-200 transition-all text-sm"
            placeholder="https://example.com/ontology"
            formControlName="url"
          />
        </div>

        <div class="flex-1">
          <label class="block text-xs font-semibold text-gray-600 mb-1 ml-1">Label</label>
          <input
            class="w-full p-2 rounded-lg border border-gray-300 focus:border-blue-500 focus:ring-2 focus:ring-blue-200 transition-all text-sm"
            placeholder="Ontology name"
            formControlName="label"
          />
        </div>

        <div class="flex-shrink-0">
          <button
            type="button"
            class="w-full sm:w-auto bg-gradient-to-r from-green-500 to-green-600 hover:from-green-600 hover:to-green-700 text-white px-5 py-2 rounded-lg transition-all duration-200 shadow-sm hover:shadow-md font-medium flex items-center justify-center gap-2"
            (click)="add()">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path>
            </svg>
            Add
          </button>
        </div>

      </div>

      <!-- Optional: Form validation hints -->
      <div *ngIf="form.get('url')?.invalid && form.get('url')?.touched" class="text-xs text-red-500 mt-2 ml-1">
        URL is required
      </div>

    </form>

  </div>

</div>
