<div class="sticky top-0 bg-white border-b border-gray-200 px-6 py-4 flex items-center justify-between z-10">
    <button (click)="backToPreviousEntity()" 
        [class.invisible]="previousSelectedEntity === null"
        class="cursor-pointer text-gray-700 hover:text-black w-6 h-6 flex items-center justify-center transition-opacity duration-200"
    >
        <svg 
        xmlns="http://www.w3.org/2000/svg" 
        class="w-6 h-6"
        viewBox="0 0 24 24" 
        fill="none" 
        stroke="currentColor" 
        stroke-width="2" 
        stroke-linecap="round" 
        stroke-linejoin="round">
        <path d="M15 18l-6-6 6-6"/>
        </svg>
    </button>
    <div class="flex items-center gap-3">
        <h2 class="text-lg font-semibold text-gray-900">{{ selectedEntity?.titre }}</h2>
    </div>
    <button (click)="closeDetail()" class="cursor-pointer p-1.5 hover:bg-gray-100 rounded-lg transition-colors" aria-label="Fermer">
        <svg class="w-5 h-5 text-gray-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>
        </svg>
    </button>
</div>

<div class="flex gap-1 mb-6 bg-gray-100 p-1 rounded-lg">
    <button (click)="detailTab = 'ric'" [class.bg-white]="detailTab === 'ric'" [class.text-gray-900]="detailTab === 'ric'" [class.shadow-sm]="detailTab === 'ric'" class="cursor-pointer flex-1 px-3 py-2 text-sm font-medium text-gray-600 hover:bg-gray-50 rounded-md transition-colors">RIC</button>
    <button (click)="detailTab = 'foaf'" [class.bg-white]="detailTab === 'foaf'" [class.text-gray-900]="detailTab === 'foaf'" [class.shadow-sm]="detailTab === 'foaf'" class="cursor-pointer flex-1 px-3 py-2 text-sm font-medium text-gray-600 hover:bg-gray-50 rounded-md transition-colors">FOAF</button>
    <button (click)="detailTab = 'metadata'" [class.bg-white]="detailTab === 'metadata'" [class.text-gray-900]="detailTab === 'metadata'" [class.shadow-sm]="detailTab === 'metadata'" class="cursor-pointer flex-1 px-3 py-2 text-sm font-medium text-gray-600 hover:bg-gray-50 rounded-md transition-colors">Metadata</button>
</div>

<div class="flex flex-col gap-4! p-3!" *ngIf="detailTab === 'ric'">

    <!-- ID Field -->
    <div class="mb-6">
        <label class="block text-sm font-medium text-gray-700 mb-2">ID</label>
        <div class="flex items-center justify-between p-3 bg-gray-50 border border-gray-200 rounded-lg">
            <span class="text-sm text-gray-600 font-mono">{{ selectedEntity?.entityKey }}</span>
            <button (click)="copyToClipboard(selectedEntity?.entityKey)" class="text-gray-400 hover:text-gray-600 transition-colors" aria-label="Copier l'ID">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z"></path>
            </svg>
            </button>
        </div>
    </div>

    <!-- Name Field -->
    <div class="mb-6">
        <label class="block text-sm font-medium text-gray-700 mb-2">
            Label
            <button class="inline ml-1 text-gray-400 hover:text-gray-600" aria-label="Information">
            <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path>
            </svg>
            </button>
        </label>
        <div class="flex items-center justify-between p-3 bg-gray-50 border border-gray-200 rounded-lg">
            <input
            *ngIf="selectedEntity"
            type="text"
            [(ngModel)]="selectedEntity.label"
            
            class="text-sm text-gray-900 font-medium w-full bg-transparent focus:outline-none"
            />
            <button class="text-gray-400 hover:text-gray-600 transition-colors" aria-label="Supprimer">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>
            </svg>
            </button>
        </div>
    </div>

    <!-- Birth Date -->
    <div *ngIf="selectedEntity?.birthDate" class="mb-6">
        <label class="block text-sm font-medium text-gray-700 mb-2">
            Birth Date
            <button class="inline ml-1 text-gray-400 hover:text-gray-600" aria-label="Information">
            <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path>
            </svg>
            </button>
        </label>
        <div class="flex items-center gap-2">
            <input type="text" [value]="selectedEntity?.birthDate" readonly class="flex-1 px-3 py-2 bg-gray-50 border border-gray-200 rounded-lg text-sm text-gray-900">
            <button class="p-2 hover:bg-gray-100 rounded-lg transition-colors" aria-label="Sélectionner une date">
            <svg class="w-5 h-5 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"></path>
            </svg>
            </button>
            <button class="text-gray-400 hover:text-gray-600 transition-colors" aria-label="Supprimer">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>
            </svg>
            </button>
        </div>
    </div>

    <!-- Death Date -->
    <div *ngIf="selectedEntity?.deathDate" class="mb-6">
        <label class="block text-sm font-medium text-gray-700 mb-2">
            Death Date
            <button class="inline ml-1 text-gray-400 hover:text-gray-600" aria-label="Information">
            <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path>
            </svg>
            </button>
        </label>
        <div class="flex items-center gap-2">
            <input type="text" [value]="selectedEntity?.deathDate" readonly class="flex-1 px-3 py-2 bg-gray-50 border border-gray-200 rounded-lg text-sm text-gray-900">
            <button class="p-2 hover:bg-gray-100 rounded-lg transition-colors" aria-label="Sélectionner une date">
            <svg class="w-5 h-5 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"></path>
            </svg>
            </button>
            <button class="text-gray-400 hover:text-gray-600 transition-colors" aria-label="Supprimer">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>
            </svg>
            </button>
        </div>
    </div>

    <!-- Associated With -->
    <div *ngIf="selectedEntity?.associatedWith && selectedEntity?.associatedWith!.length > 0" class="mb-6 flex flex-col gap-2!">
        <label class="block text-sm font-medium text-gray-700 mb-2">
            Associated With ({{ selectedEntity?.associatedWith!.length }})
            <button class="inline ml-1 text-gray-400 hover:text-gray-600" aria-label="Information">
            <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path>
            </svg>
            </button>
        </label>
        <div class="space-y-2 flex flex-col gap-2!">

            <!-- référence -->
            <div (click)="changeEntityView(person)" *ngFor="let person of selectedEntity?.associatedWith" class="cursor-pointer flex items-center justify-between p-3 bg-blue-50 border border-blue-200 rounded-lg group hover:bg-blue-100 transition-colors">
            <div class="flex items-center gap-2">
                <svg class="w-4 h-4 text-blue-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path>
                </svg>
                <span class="text-sm text-blue-700 font-medium">{{ person }}</span>
            </div>
            <button (click)="removeAssociation(person)" class="text-blue-400 hover:text-blue-600 transition-colors" aria-label="Supprimer l'association">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>
                </svg>
            </button>
            </div>
        </div>
        <button (click)="addAssociation()" class="mt-2 flex items-center gap-1 text-sm text-blue-600 hover:text-blue-700 font-medium transition-colors">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path>
            </svg>
            Ajouter une association
        </button>
    </div>

    <div class="mt-8 flex gap-3">
        <button class="flex-1 px-4 py-2.5 bg-blue-600 text-white rounded-lg hover:bg-blue-700 transition-colors text-sm font-medium shadow-sm">
        Enregistrer
        </button>
        <button class="px-4 py-2.5 border border-red-300 text-red-700 rounded-lg hover:bg-red-50 transition-colors text-sm font-medium">
        Supprimer
        </button>
    </div>
</div>

<!-- FOAF Tab Content -->
<div *ngIf="detailTab === 'foaf'" class="text-center py-12">
    <svg class="mx-auto h-12 w-12 text-gray-300" fill="none" stroke="currentColor" viewBox="0 0 24 24">
    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path>
    </svg>
    <p class="mt-4 text-sm text-gray-500">Données FOAF à venir</p>
</div>

<!-- Metadata Tab Content -->
<div *ngIf="detailTab === 'metadata'" class="text-center p-12!">
    <div class="space-y-4">
    <div>
        <span class="text-xs font-semibold text-gray-500 uppercase tracking-wider">Type</span>
        <p class="mt-1 text-sm text-gray-900">{{ selectedEntity?.type }}</p>
    </div>
    <div>
        <span class="text-xs font-semibold text-gray-500 uppercase tracking-wider">Source</span>
        <p class="mt-1 text-sm text-gray-900">{{ selectedEntity?.source }}</p>
    </div>
    <div>
        <span class="text-xs font-semibold text-gray-500 uppercase tracking-wider">Statut</span>
        <p class="mt-1 text-sm text-gray-900">{{ selectedEntity?.statut }}</p>
    </div>
    <div>
        <span class="text-xs font-semibold text-gray-500 uppercase tracking-wider">Date</span>
        <p class="mt-1 text-sm text-gray-900">{{ selectedEntity?.date }}</p>
    </div>
    </div>
</div>
