<div class="flex flex-col h-screen bg-gray-50">
  <!-- Header -->
  <header class="bg-gradient-to-r from-blue-900 to-blue-600 shadow-lg">
    <div class="flex items-center justify-between px-6 py-4">
      <!-- Left: Logo and Title -->
      <div class="flex items-center gap-4">
        <div class="flex items-center justify-center w-10 h-10 bg-white/20 backdrop-blur-sm rounded-xl hover:bg-white/30 transition-all duration-300 cursor-pointer">
          <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 2L2 7l10 5 10-5-10-5z"></path>
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2 17l10 5 10-5"></path>
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2 12l10 5 10-5"></path>
          </svg>
        </div>

        <div>
          <h1 *ngIf="projectName; else spinner" class="text-xl font-bold text-white tracking-tight">
            {{ projectName }}
          </h1>
          <ng-template #spinner>
            <div class="flex items-center gap-2">
              <svg class="animate-spin h-5 w-5 text-white opacity-70" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"></path>
              </svg>
              <span class="text-white opacity-50 text-sm italic">Loading...</span>
            </div>
          </ng-template>
          <p class="text-xs text-blue-100">RDF Entity Management System</p>
        </div>


      </div>

      <!-- Right: View Tabs -->
      <nav class="flex gap-4 bg-white/10 backdrop-blur-md p-1 rounded-lg" role="tablist">
        <button (click)="setView('tableau')" [class.bg-white]="activeView === 'tableau'" [class.text-blue-600]="activeView === 'tableau'" [class.shadow-sm]="activeView === 'tableau'" class="cursor-pointer flex items-center gap-2 px-4 py-2 rounded-md text-sm font-medium transition-all duration-200 hover:bg-white/20" role="tab" [attr.aria-selected]="activeView === 'tableau'" aria-label="Tab View">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <rect x="3" y="3" width="7" height="7" stroke-width="2"></rect>
            <rect x="14" y="3" width="7" height="7" stroke-width="2"></rect>
            <rect x="14" y="14" width="7" height="7" stroke-width="2"></rect>
            <rect x="3" y="14" width="7" height="7" stroke-width="2"></rect>
          </svg>
          <span>Tab View</span>
        </button>
        
        <button (click)="setView('graphe')" [class.bg-white]="activeView === 'graphe'" [class.text-blue-600]="activeView === 'graphe'" [class.shadow-sm]="activeView === 'graphe'" class="cursor-pointer flex items-center gap-2 px-4 py-2 rounded-md text-sm font-medium transition-all duration-200 hover:bg-white/20" role="tab" [attr.aria-selected]="activeView === 'graphe'" aria-label="Graph View">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <circle cx="18" cy="5" r="3" stroke-width="2"></circle>
            <circle cx="6" cy="12" r="3" stroke-width="2"></circle>
            <circle cx="18" cy="19" r="3" stroke-width="2"></circle>
            <line x1="8.59" y1="13.51" x2="15.42" y2="17.49" stroke-width="2"></line>
            <line x1="15.41" y1="6.51" x2="8.59" y2="10.49" stroke-width="2"></line>
          </svg>
          <span>Graph View</span>
        </button>
        
        <button (click)="setView('sources')" [class.bg-white]="activeView === 'sources'" [class.text-blue-600]="activeView === 'sources'" [class.shadow-sm]="activeView === 'sources'" class="cursor-pointer flex items-center gap-2 px-4 py-2 rounded-md text-sm font-medium transition-all duration-200 hover:bg-white/20" role="tab" [attr.aria-selected]="activeView === 'sources'" aria-label="Datasource View">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path>
          </svg>
          <span>Datasource View</span>
        </button>
        
        <button (click)="setView('sparql')" [class.bg-white]="activeView === 'sparql'" [class.text-blue-600]="activeView === 'sparql'" [class.shadow-sm]="activeView === 'sparql'" class="cursor-pointer flex items-center gap-2 px-4 py-2 rounded-md text-sm font-medium transition-all duration-200 hover:bg-white/20" role="tab" [attr.aria-selected]="activeView === 'sparql'" aria-label="SPARQL view">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <polyline points="16 18 22 12 16 6" stroke-width="2"></polyline>
            <polyline points="8 6 2 12 8 18" stroke-width="2"></polyline>
          </svg>
          <span>SPARQL</span>
        </button>
      </nav>
    </div>
  </header>

  <!-- Main Content Area -->
  <div class="flex flex-1 overflow-hidden">
    <!-- Sidebar -->
    <aside class="w-60 bg-white border-r border-gray-200 overflow-y-auto shadow-sm flex flex-col">
      <div class="p-4 flex-1">
        <!-- Header section with gradient accent -->
        <div class="mb-4 pb-2 border-b border-gray-100">
          <div class="flex items-center justify-between mb-1">
            <h2 class="text-xs font-semibold text-gray-600 uppercase tracking-wider">RDF Dictionaries</h2>
            <span class="inline-flex items-center justify-center px-2 py-0.5 text-xs font-medium rounded-full bg-blue-50 text-blue-600">{{ formattedEntities?.length }}</span>
          </div>
          <p class="text-[11px] text-gray-400">Browse by type</p>
        </div>
        
        <mat-accordion class="flex flex-col gap-2">
          <mat-expansion-panel 
            *ngFor="let ontology_type of ontologyLabels" 
            class="!border-none !shadow-none !rounded-lg overflow-hidden transition-all duration-200"
            [class.!bg-gray-50]="panelOpenState()"
            (opened)="panelOpenState.set(true)" 
            (closed)="panelOpenState.set(false)">
            
            <mat-expansion-panel-header class="!px-3 !py-2 hover:!bg-gray-50 transition-colors duration-150 rounded-lg">
              <mat-panel-title class="text-sm font-medium text-gray-700">
                {{ getKey(ontology_type) }}
              </mat-panel-title>
              <mat-panel-description class="justify-end">
                <span class="text-xs text-gray-400">{{ getValuesOfKey(ontology_type)?.length }}</span>
              </mat-panel-description>
            </mat-expansion-panel-header>
            
            <div class="pt-1 pb-2">
              <div class="space-y-0.5">
                <button 
                  *ngFor="let entityType of getValuesOfKey(ontology_type)" 
                  [class.bg-blue-50]="selectedType === entityType.type" 
                  [class.border-l-3]="selectedType === entityType.type"
                  [class.border-l-blue-500]="selectedType === entityType.type"
                  [class.text-blue-700]="selectedType === entityType.type"
                  class="w-full text-left px-3 py-2 text-sm rounded-lg hover:bg-gray-50 transition-all duration-150 group relative"
                  [attr.aria-pressed]="selectedType === entityType.type"
                  (click)="getAllEntitiesByPath(getKey(ontology_type), entityType)">
                  
                  <div class="flex items-center justify-between">
                    <span class="text-sm font-medium group-hover:text-gray-900 transition-colors duration-150">
                      {{ entityType }}
                    </span>
                    <span *ngIf="selectedType === entityType.type" class="text-blue-500 text-xs">●</span>
                  </div>
                </button>
              </div>
            </div>
          </mat-expansion-panel>
        </mat-accordion>

        <!-- Enhanced empty state with better visual feedback -->
        <div *ngIf="ontologyLabels.length === 0" class="text-center py-12 px-4">
          <div class="inline-flex items-center justify-center w-12 h-12 bg-gray-50 rounded-full mb-3">
            <svg class="h-6 w-6 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path>
            </svg>
          </div>
          <p class="text-sm font-medium text-gray-500">No types found</p>
          <p class="text-xs text-gray-400 mt-1">Try adjusting your search</p>
        </div>
      </div>
    </aside>

    <div  *ngIf="activeView === 'tableau'" class="p-0! w-[85%]!" [@slideIn]>
      <div class="p-1! flex-1 overflow-y-auto bg-gray-50 ">
        <app-liste-entites *ngIf="formattedEntities" [allEntities]="formattedEntities" (selectedEntity)="handleChildData($event)"></app-liste-entites>
      </div>    
    </div>

    <!-- Detail Panel -->
    <aside *ngIf="selectedEntity" [@slideIn] class="w-150! bg-white border-l border-gray-200 overflow-y-auto shadow-xl">

      <div class="p-6">
        <app-entity-details  [selectedEntityId]="selectedEntity.entityKey"></app-entity-details>
      </div>

    </aside>
  </div>

</div>
