<div class="p-6 overflow-y-auto max-h-[calc(90vh-100px)]">
  <form [formGroup]="personForm" class="space-y-6">

    <!-- Entity Type -->
    <div class="w-full">
      <div class="flex items-center justify-between mb-3">
        <label class="block text-sm font-medium text-gray-700">
          Entity type *
        </label>
      </div>

      <!-- Mode toggle -->
      <div class="flex rounded-lg border border-gray-300 overflow-hidden w-fit mb-4 text-sm">
        <button type="button"
          (click)="setTypeMode('existing')"
          [class.bg-blue-50]="typeMode === 'existing'"
          [class.text-blue-700]="typeMode === 'existing'"
          [class.font-medium]="typeMode === 'existing'"
          [class.text-gray-500]="typeMode !== 'existing'"
          class="cursor-pointer px-4 py-2 transition-colors">
          Existing type
        </button>
        <button type="button"
          (click)="setTypeMode('custom')"
          [class.bg-blue-50]="typeMode === 'custom'"
          [class.text-blue-700]="typeMode === 'custom'"
          [class.font-medium]="typeMode === 'custom'"
          [class.text-gray-500]="typeMode !== 'custom'"
          class="cursor-pointer px-4 py-2 border-l border-gray-300 transition-colors">
          Custom type
        </button>
      </div>

      <!-- Existing type panel -->
      <div *ngIf="typeMode === 'existing'"
        class="p-4 bg-gray-50 border border-gray-200 rounded-lg">
        <label class="block text-xs font-medium text-gray-700 mb-2">Select a type</label>
        <select formControlName="entityType"
          class="cursor-pointer w-full px-3 py-2.5 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent text-sm transition-all">
          <option value="" disabled>Loading types…</option>
          <option *ngFor="let t of availableTypes" [value]="t">{{ t }}</option>
        </select>
        <p class="mt-1.5 text-xs text-gray-400">Types are fetched from the RDF graph base.</p>
      </div>

      <!-- Custom type panel -->
      <div *ngIf="typeMode === 'custom'"
        class="p-4 bg-gray-50 border border-gray-200 rounded-lg space-y-4">

        <!-- Source sub-toggle -->
        <div>
          <label class="block text-xs font-medium text-gray-700 mb-2">Type source</label>
          <div class="flex gap-2 flex-wrap">
            <button type="button"
              (click)="setCustomSource('url')"
              [class.bg-blue-50]="customSource === 'url'"
              [class.text-blue-700]="customSource === 'url'"
              [class.border-blue-300]="customSource === 'url'"
              [class.text-gray-500]="customSource !== 'url'"
              class="cursor-pointer px-3 py-1.5 text-xs border border-gray-300 rounded-lg transition-colors">
              Ontology URL + name
            </button>
            <button type="button"
              (click)="setCustomSource('full')"
              [class.bg-blue-50]="customSource === 'full'"
              [class.text-blue-700]="customSource === 'full'"
              [class.border-blue-300]="customSource === 'full'"
              [class.text-gray-500]="customSource !== 'full'"
              class="cursor-pointer px-3 py-1.5 text-xs border border-gray-300 rounded-lg transition-colors">
              Full URI
            </button>
          </div>
        </div>

        <!-- Ontology URL + name -->
        <div *ngIf="customSource === 'url'" formGroupName="customTypeUrl">
          <label class="block text-xs font-medium text-gray-700 mb-2">Ontology</label>
          <div class="flex gap-2 items-center">

            <!-- Ontology picker (replaces free-text baseUrl input) -->
            <select formControlName="selectedIri"
              class="cursor-pointer flex-[1.5] px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 text-xs">
              <option value="" disabled>Select an ontology…</option>
              <option *ngFor="let o of ontologyList" [value]="o.iri">{{ o.name }}</option>
            </select>

            <span class="text-gray-400 text-xs shrink-0">/</span>

            <!-- Type name free-text input -->
            <input type="text" formControlName="typeName"
              placeholder="Entity"
              class="flex-1 px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 text-xs">
          </div>

          <!-- Resolved URI preview -->
          <p *ngIf="resolvedTypeUri" class="mt-1.5 text-xs text-gray-400">
            Resolved URI: <code class="text-gray-600">{{ resolvedTypeUri }}</code>
          </p>
        </div>

        <!-- Full URI -->
        <div *ngIf="customSource === 'full'">
          <label class="block text-xs font-medium text-gray-700 mb-2">Full type URI</label>
          <input type="text" formControlName="customTypeUri"
            placeholder="https://www.w3.org/ns/prov#Entity"
            class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 text-xs">
          <p class="mt-1.5 text-xs text-gray-400">Enter the complete, fully qualified URI for this type.</p>
        </div>

      </div>

      <div *ngIf="personForm.get('entityType')?.invalid && personForm.get('entityType')?.touched"
        class="mt-1 text-xs text-red-600">
        Entity type is required.
      </div>
    </div>


    <!-- Associations -->
    <div>
      <div class="flex items-center justify-between mb-3">
        <label class="block text-sm font-medium text-gray-700">
          Associations
        </label>
        <button type="button" (click)="addAssociationField()"
          class="hover:cursor-pointer flex items-center gap-1 text-sm text-blue-600 hover:text-blue-700 font-medium transition-colors">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path>
          </svg>
          Add Association
        </button>
      </div>

      <div formArrayName="associations" class="space-y-3">
        <div *ngFor="let assoc of associationsArray.controls; let i = index">

          <div [formGroupName]="i" class="flex gap-6 p-3">
            <div class="flex items-center gap-2 w-full">

              <!-- Predicate -->
              <div class="w-[45%]">
                <label class="block text-xs font-medium text-gray-700 mb-2">Predicate *</label>
                <select formControlName="predicate"
                  class="w-full px-3 py-2.5 border border-gray-300 rounded-lg text-xs">
                  <option value="">Select predicate</option>
                  <option>rico:pred1</option>
                  <option>rico:pred2</option>
                  <option>rico:pred3</option>
                </select>
              </div>

              <!-- Object -->
              <div class="w-[50%]">
                <label class="block text-xs font-medium text-gray-700 mb-2">Value *</label>
                <input formControlName="object"
                  class="w-full px-3 py-2 border border-gray-300 rounded-lg text-xs"
                  placeholder="Value">
              </div>

              <!-- Actions -->
              <div class="w-[10%] flex items-center justify-center">
                <button (click)="removeAssociationField(i)"
                  class="hover:cursor-pointer w-[40%] h-[50%] text-red-700 hover:text-red-500 transition-colors">
                  <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                      d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6M9 7V4a1 1 0 011-1h4a1 1 0 011 1v3m-7 0h10"/>
                  </svg>
                </button>

                <button (click)="changeAssociationVisibility(i)"
                  class="cursor-pointer w-[60%] h-full flex items-center gap-1 text-gray-600 hover:text-blue-600 transition-colors">

                  <!-- Eye Open (visible) -->
                  <svg *ngIf="!checkAssociationVisibility(i)"
                    xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                      d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                      d="M2.458 12C3.732 7.943 7.523 5 12 5c4.477 0 8.268 2.943 9.542 7-1.274 4.057-5.065 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>
                  </svg>

                  <!-- Eye Closed (invisible) -->
                  <svg *ngIf="checkAssociationVisibility(i)"
                    xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                      d="M13.875 18.825A10.05 10.05 0 0112 19c-4.477 0-8.268-2.943-9.542-7a9.97 9.97 0 012.162-3.591"/>
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                      d="M9.878 9.878a3 3 0 104.243 4.243"/>
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                      d="M6.111 6.111A9.955 9.955 0 0112 5c4.477 0 8.268 2.943 9.542 7a9.97 9.97 0 01-1.652 3.13"/>
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 3l18 18"/>
                  </svg>

                </button>
              </div>

            </div>
          </div>

          <div *ngIf="checkAssociationVisibility(i)" class="flex justify-center items-center">
            <div class="border-gray-300 border-2 max-h-[400px] overflow-y-auto bg-gray-200 w-[80%] flex flex-col gap-1! p-3!">
              <app-entity-details></app-entity-details>
            </div>
          </div>

        </div>
      </div>
    </div>


    <!-- Custom Fields -->
    <div>
      <div class="flex items-center justify-between mb-3">
        <label class="block text-sm font-medium text-gray-700">
          Custom Fields
        </label>
        <button type="button" (click)="addCustomField()"
          class="hover:cursor-pointer flex items-center gap-1 text-sm text-blue-600 hover:text-blue-700 font-medium transition-colors">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path>
          </svg>
          Add Custom Field
        </button>
      </div>

      <div formArrayName="customFields" class="space-y-3">
        <div *ngFor="let fieldGroup of customFieldsArray.controls; let i = index"
          [formGroupName]="i" class="grid grid-cols-12 gap-2">
          <input type="text" formControlName="name" placeholder="Nom du champ"
            class="col-span-5 px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent text-sm transition-all">
          <span class="col-span-1 text-center text-gray-400">=</span>
          <input type="text" formControlName="value" placeholder="Valeur"
            class="col-span-5 px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent text-sm transition-all">
          <button type="button" (click)="removeCustomField(i)"
            class="hover:cursor-pointer col-span-1 p-2 text-gray-400 hover:text-red-600 transition-colors" aria-label="Supprimer">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>
            </svg>
          </button>
        </div>
      </div>
    </div>


    <!-- Actions -->
    <div class="flex justify-end gap-3 pt-4 border-t border-gray-200">
      <button type="button" (click)="cancelNewPerson()"
        class="px-4 py-2.5 border border-gray-300 text-gray-700 rounded-lg hover:bg-gray-50 transition-colors text-sm font-medium">
        Cancel
      </button>
      <button (click)="saveNewPerson()" type="submit" [disabled]="personForm.invalid"
        class="px-4 py-2.5 bg-blue-600 text-white rounded-lg hover:bg-blue-700 transition-colors text-sm font-medium disabled:opacity-50 disabled:cursor-not-allowed shadow-sm">
        Create Person
      </button>
    </div>

  </form>
</div>
