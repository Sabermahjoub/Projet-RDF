<div class="p-6 overflow-y-auto max-h-[calc(90vh-100px)]">
    <form [formGroup]="personForm" class="space-y-6">
        
        <!-- Titre -->
        <div class="w-full">
            <label class="block text-sm font-medium text-gray-700 mb-2">
            Name *
            </label>
            <input type="text" formControlName="titre" placeholder="Nom complet" 
                    class="w-full px-3 py-2.5 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent text-sm transition-all"
                    [class.border-red-300]="personForm.get('titre')?.invalid && personForm.get('titre')?.touched">
            <div *ngIf="personForm.get('titre')?.invalid && personForm.get('titre')?.touched" class="mt-1 text-xs text-red-600">
            Entity name is required.
            </div>
        </div>

        <!-- Source et Statut -->
        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
        <!-- Source -->
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-2">
                Datasource *
                </label>
                <select formControlName="source"
                        class="w-full px-3 py-2.5 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent text-sm transition-all">
                <option value="">Select a datasource</option>
                <option value="Manuel">Manuel</option>
                <option value="Automatique">Automatique</option>
                <option value="Archives scientifiques">Archives scientifiques</option>
                <option value="Archives institutionnelles">Archives institutionnelles</option>
                <option value="Bibliothèque nationale">Bibliothèque nationale</option>
                </select>
            </div>

        <!-- Statut -->
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-2">
                Status *
                </label>
                <select formControlName="statut"
                        class="w-full px-3 py-2.5 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent text-sm transition-all">
                <option value="">Select a status</option>
                <option value="complet">Complete</option>
                <option value="partiel">Partial</option>
                </select>
            </div>
        </div>

        <!-- Dates de naissance et décès -->
        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
        <!-- Date de naissance -->
        <div>
            <label class="block text-sm font-medium text-gray-700 mb-2">
            Date of birth
            </label>
            <input type="date" formControlName="birthDate"
                    class="w-full px-3 py-2.5 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent text-sm transition-all">
        </div>

        <!-- Date de décès -->
        <div>
            <label class="block text-sm font-medium text-gray-700 mb-2">
            Date of death
            </label>
            <input type="date" formControlName="deathDate"
                    class="w-full px-3 py-2.5 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent text-sm transition-all">
        </div>
        </div>

        <!-- Associations -->
        <div>
            <div class="flex items-center justify-between mb-3">
                <label class="block text-sm font-medium text-gray-700">
                Associations
                </label>
                <button type="button" (click)="addAssociationField()" 
                        class="flex items-center gap-1 text-sm text-blue-600 hover:text-blue-700 font-medium transition-colors">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path>
                </svg>
                Add Association
                </button>
            </div>

            <div formArrayName="associations" class="space-y-3">

                <div *ngFor="let assoc of associationsArray.controls; let i = index"
                    [formGroupName]="i"
                    class="flex gap-6 p-3">

                    <!-- Predicate -->
                    <div class="w-[45%]">
                    <label class="block text-xs font-medium text-gray-700 mb-2">
                        Predicate *
                    </label>

                    <select formControlName="predicate"
                        class="w-full px-3 py-2.5 border border-gray-300 rounded-lg text-xs">

                        <option value="">Select predicate</option>
                        <option>rico:pred1</option>
                        <option>rico:pred2</option>
                        <option>rico:pred3</option>

                    </select>
                    </div>

                    <!-- Object -->
                    <div class="w-[50%]">
                    <label class="block text-xs font-medium text-gray-700 mb-2">
                        Value *
                    </label>

                    <input formControlName="object"
                        class="w-full px-3 py-2 border border-gray-300 rounded-lg text-xs"
                        placeholder="Value">
                    </div>

                    <button (click)="removeAssociationField(i)" class="w-[5%] h-[5%] text-red-700 hover:text-red-500 transition-colors">
                    <svg xmlns="http://www.w3.org/2000/svg"
                        class="w-4 h-4"
                        fill="none"
                        viewBox="0 0 24 24"
                        stroke="currentColor">
                        <path stroke-linecap="round"
                            stroke-linejoin="round"
                            stroke-width="2"
                            d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6M9 7V4a1 1 0 011-1h4a1 1 0 011 1v3m-7 0h10"/>
                    </svg>
                    </button>

                </div>

            </div>

        
        </div>

        <!-- Champs personnalisés -->
        <div>
        <div class="flex items-center justify-between mb-3">
            <label class="block text-sm font-medium text-gray-700">
            Custom Fields
            </label>
            <button type="button" (click)="addCustomField()" 
                    class="flex items-center gap-1 text-sm text-blue-600 hover:text-blue-700 font-medium transition-colors">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path>
            </svg>
            Add Custom Field
            </button>
        </div>
        
        <div formArrayName="customFields" class="space-y-3">
            <div *ngFor="let fieldGroup of customFieldsArray.controls; let i = index" 
                [formGroupName]="i" class="grid grid-cols-12 gap-2">
            <input type="text" formControlName="name" placeholder="Nom du champ"
                    class="col-span-5 px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent text-sm transition-all">
            <span class="col-span-1 text-center text-gray-400">=</span>
            <input type="text" formControlName="value" placeholder="Valeur"
                    class="col-span-5 px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent text-sm transition-all">
            <button type="button" (click)="removeCustomField(i)"
                    class="col-span-1 p-2 text-gray-400 hover:text-red-600 transition-colors" aria-label="Supprimer">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>
                </svg>
            </button>
            </div>
        </div>
        </div>

        <!-- Actions -->
        <div class="flex justify-end gap-3 pt-4 border-t border-gray-200">
        <button type="button" (click)="cancelNewPerson()"
                class="px-4 py-2.5 border border-gray-300 text-gray-700 rounded-lg hover:bg-gray-50 transition-colors text-sm font-medium">
            Cancel
        </button>
        <button type="submit" [disabled]="personForm.invalid"
                class="px-4 py-2.5 bg-blue-600 text-white rounded-lg hover:bg-blue-700 transition-colors text-sm font-medium disabled:opacity-50 disabled:cursor-not-allowed shadow-sm">
            Create Person
        </button>
        </div>
    </form>
</div>
