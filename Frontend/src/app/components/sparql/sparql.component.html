<div class="p-6 max-w-full">
  <div class="mb-4">
    <div class="flex items-center gap-3 mb-3">
      <span class="text-sm font-medium text-gray-500 dark:text-gray-400">Query type</span>
      <div class="flex rounded-lg border border-gray-200 dark:border-gray-700 overflow-hidden">
        <button
          *ngFor="let t of queryTypes"
          (click)="selectedType = t"
          [class]="selectedType === t
            ? 'px-4 py-1.5 text-sm font-medium bg-gray-900 text-white dark:bg-white dark:text-gray-900'
            : 'px-4 py-1.5 text-sm text-gray-600 dark:text-gray-400 hover:bg-gray-50 dark:hover:bg-gray-800 transition-colors'">
          {{ t }}
        </button>
      </div>
    </div>

    <div class="relative">
      <textarea
        [(ngModel)]="query"
        rows="10"
        placeholder="Write your SPARQL query here..."
        class="w-full font-mono text-sm p-4 rounded-xl border border-gray-200 dark:border-gray-700
               bg-gray-50 dark:bg-gray-900 text-gray-900 dark:text-gray-100
               focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent
               resize-y placeholder-gray-400 dark:placeholder-gray-600 leading-relaxed">
      </textarea>
    </div>

    <div class="flex items-center justify-between mt-3">
      <div class="flex gap-2">
        <button *ngFor="let ex of examples" (click)="loadExample(ex)"
          class="text-xs px-3 py-1.5 rounded-lg border border-gray-200 dark:border-gray-700
                 text-gray-500 dark:text-gray-400 hover:bg-gray-50 dark:hover:bg-gray-800
                 hover:text-gray-700 dark:hover:text-gray-200 transition-colors">
          {{ ex.label }}
        </button>
      </div>
      <div class="flex items-center gap-3">
        <button (click)="clearAll()"
          class="text-sm text-gray-400 hover:text-gray-600 dark:hover:text-gray-200 transition-colors">
          Clear
        </button>
        <button (click)="runQuery()"
          [disabled]="loading || !query.trim()"
          class="flex items-center gap-2 px-5 py-2 rounded-xl bg-indigo-600 hover:bg-indigo-700
                 disabled:opacity-40 disabled:cursor-not-allowed
                 text-white text-sm font-medium transition-colors">
          <svg *ngIf="!loading" class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
              d="M14.752 11.168l-3.197-2.132A1 1 0 0010 9.87v4.263a1 1 0 001.555.832l3.197-2.132a1 1 0 000-1.664z"/>
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
              d="M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
          </svg>
          <svg *ngIf="loading" class="w-4 h-4 animate-spin" fill="none" viewBox="0 0 24 24">
            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"/>
            <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8v8H4z"/>
          </svg>
          {{ loading ? 'Running...' : 'Run query' }}
        </button>
      </div>
    </div>
  </div>

  <div *ngIf="error"
    class="mb-4 p-4 rounded-xl bg-red-50 dark:bg-red-900/20 border border-red-200 dark:border-red-800
           text-red-700 dark:text-red-400 text-sm font-mono">
    {{ error }}
  </div>

  <div *ngIf="updateSuccess"
    class="mb-4 p-4 rounded-xl bg-green-50 dark:bg-green-900/20 border border-green-200 dark:border-green-800
           text-green-700 dark:text-green-400 text-sm">
    Update executed successfully.
  </div>

  <div *ngIf="results.length > 0" class="rounded-xl border border-gray-200 dark:border-gray-700 overflow-hidden">
    <div class="flex items-center justify-between px-4 py-3 bg-gray-50 dark:bg-gray-800 border-b border-gray-200 dark:border-gray-700">
      <span class="text-sm text-gray-500 dark:text-gray-400">
        {{ results.length }} result{{ results.length !== 1 ? 's' : '' }}
      </span>
      <div class="flex gap-2">
        <button (click)="viewMode = 'table'"
          [class]="viewMode === 'table' ? activeTabClass : inactiveTabClass">
          Table
        </button>
        <button (click)="viewMode = 'json'"
          [class]="viewMode === 'json' ? activeTabClass : inactiveTabClass">
          JSON
        </button>
      </div>
    </div>

    <div *ngIf="viewMode === 'table'" class="overflow-x-auto">
      <table class="w-full text-sm">
        <thead>
          <tr class="bg-gray-50 dark:bg-gray-800 border-b border-gray-200 dark:border-gray-700">
            <th *ngFor="let col of columns"
              class="px-4 py-3 text-left text-xs font-medium text-gray-500 dark:text-gray-400 uppercase tracking-wider whitespace-nowrap">
              {{ col }}
            </th>
          </tr>
        </thead>
        <tbody>
          <tr *ngFor="let row of results; let i = index"
            [class]="i % 2 === 0
              ? 'border-b border-gray-100 dark:border-gray-800'
              : 'border-b border-gray-100 dark:border-gray-800 bg-gray-50/50 dark:bg-gray-800/30'">
            <td *ngFor="let col of columns"
              class="px-4 py-3 text-gray-800 dark:text-gray-200 font-mono text-xs max-w-xs truncate"
              [title]="row[col]">
              {{ row[col] ?? '—' }}
            </td>
          </tr>
        </tbody>
      </table>
    </div>

    <div *ngIf="viewMode === 'json'" class="overflow-auto max-h-96">
      <pre class="p-4 text-xs font-mono text-gray-800 dark:text-gray-200 whitespace-pre-wrap break-all">{{ results | json }}</pre>
    </div>
  </div>

  <div *ngIf="!loading && !error && !updateSuccess && results.length === 0 && hasRun"
    class="text-center py-12 text-gray-400 dark:text-gray-600 text-sm">
    No results returned.
  </div>
</div>
